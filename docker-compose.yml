services:
  db:
    image: mysql:8.0
    container_name: idfm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASS}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: '${DB_NAME}'
    ports:
      - '3307:3306'
    volumes:
      - ./database/idfm_hackaton.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 3s
      timeout: 2s
      retries: 10

  backend:
    image: node:20-alpine
    container_name: idfm_backend
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - PORT=${BACKEND_PORT}
    ports:
      - '${BACKEND_PORT}:${BACKEND_PORT}'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start"
    depends_on:
      db:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: idfm_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: '${DB_PASS}'
    ports:
      - '8080:80'
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: idfm_adminer
    restart: unless-stopped
    ports:
      - '8081:8080'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: idfm_frontend
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${FRONTEND_PORT}
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0
    ports:
      - '${FRONTEND_PORT}:${FRONTEND_PORT}'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run start"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: idfm_ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: idfm_ollama_init
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://idfm_ollama:11434
    entrypoint: /bin/sh -c "ollama pull mistral && echo '✅ Modèle Mistral téléchargé!'"
    depends_on:
      ollama:
        condition: service_healthy

  # ─── GlitchTip : centralisation des erreurs (alternative open-source self-hosted à Sentry) ───
  glitchtip_db:
    image: postgres:15-alpine
    container_name: idfm_glitchtip_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: '${GLITCHTIP_DB_PASSWORD}'
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'glitchtip']
      interval: 3s
      timeout: 2s
      retries: 10

  glitchtip_redis:
    image: redis:7-alpine
    container_name: idfm_glitchtip_redis
    restart: unless-stopped

  glitchtip_migrate:
    image: glitchtip/glitchtip:latest
    container_name: idfm_glitchtip_migrate
    command: ./manage.py migrate
    environment: &glitchtip_env
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip_db:5432/glitchtip
      SECRET_KEY: '${GLITCHTIP_SECRET_KEY}'
      REDIS_URL: redis://glitchtip_redis:6379/0
      PORT: '8000'
      GLITCHTIP_DOMAIN: 'http://localhost:${GLITCHTIP_PORT}'
      DEFAULT_FROM_EMAIL: '${MAIL_USER}'
      # consolemail:// en local : pas de dépendance à un vrai SMTP, l'email "envoyé" est juste
      # affiché dans les logs du conteneur (docker logs idfm_glitchtip_web). Pour un GlitchTip
      # exposé en prod, repasser sur smtp+tls://...  (smtp:// nu plante avec Gmail : pas de STARTTLS).
      EMAIL_URL: 'consolemail://'
      ENABLE_OPEN_USER_REGISTRATION: 'false'
    depends_on:
      glitchtip_db:
        condition: service_healthy

  glitchtip_web:
    image: glitchtip/glitchtip:latest
    container_name: idfm_glitchtip_web
    restart: unless-stopped
    environment: *glitchtip_env
    ports:
      - '${GLITCHTIP_PORT}:8000'
    depends_on:
      glitchtip_migrate:
        condition: service_completed_successfully
      glitchtip_redis:
        condition: service_started

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    container_name: idfm_glitchtip_worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip_env
    depends_on:
      glitchtip_migrate:
        condition: service_completed_successfully
      glitchtip_redis:
        condition: service_started

volumes:
  mysql_data:
  ollama_data:
  glitchtip_db_data: