networks:
  idfm_prod_network:
    driver: bridge

services:
  traefik:
    image: traefik:v2.11
    container_name: idfm_traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8090"
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - idfm_prod_network

  db:
    image: mysql:8.0
    container_name: idfm_db_prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASS}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "${DB_NAME}"
    networks:
      - idfm_prod_network
    volumes:
      - ./database/idfm_hackaton.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: mijose/idfm-backend:latest
    container_name: idfm_backend_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
    networks:
      - idfm_prod_network
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/uploads`)"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=${BACKEND_PORT}"

  frontend:
    image: mijose/idfm-frontend:latest
    container_name: idfm_frontend_prod
    restart: unless-stopped
    networks:
      - idfm_prod_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  ollama:
    image: ollama/ollama:latest
    container_name: idfm_ollama_prod
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - idfm_prod_network
    volumes:
      - ollama_data_prod:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: idfm_ollama_init_prod
    restart: "no"
    networks:
      - idfm_prod_network
    volumes:
      - ollama_data_prod:/root/.ollama
    environment:
      - OLLAMA_HOST=http://idfm_ollama_prod:11434
    entrypoint: /bin/sh -c "ollama pull mistral"
    depends_on:
      ollama:
        condition: service_healthy

  glitchtip_db:
    image: postgres:15-alpine
    container_name: idfm_glitchtip_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: "${GLITCHTIP_DB_PASSWORD}"
      POSTGRES_DB: glitchtip
    networks:
      - idfm_prod_network
    volumes:
      - glitchtip_db_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "glitchtip"]
      interval: 5s
      timeout: 3s
      retries: 10

  glitchtip_redis:
    image: redis:7-alpine
    container_name: idfm_glitchtip_redis_prod
    restart: unless-stopped
    networks:
      - idfm_prod_network

  glitchtip_migrate:
    image: glitchtip/glitchtip:latest
    container_name: idfm_glitchtip_migrate_prod
    restart: "no"
    command: ./manage.py migrate
    environment: &glitchtip_env
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD}@glitchtip_db:5432/glitchtip"
      SECRET_KEY: "${GLITCHTIP_SECRET_KEY}"
      REDIS_URL: redis://glitchtip_redis:6379/0
      PORT: "8000"
      GLITCHTIP_DOMAIN: "${FRONTEND_URL}"
      DEFAULT_FROM_EMAIL: "${MAIL_USER}"
      EMAIL_URL: "smtp+tls://${MAIL_USER}:${MAIL_PASS}@${MAIL_HOST}:${MAIL_PORT}"
      ENABLE_OPEN_USER_REGISTRATION: "false"
    networks:
      - idfm_prod_network
    depends_on:
      glitchtip_db:
        condition: service_healthy
      glitchtip_redis:
        condition: service_started

  glitchtip_web:
    image: glitchtip/glitchtip:latest
    container_name: idfm_glitchtip_web_prod
    restart: unless-stopped
    environment: *glitchtip_env
    networks:
      - idfm_prod_network
    ports:
      - "8001:8000"
    depends_on:
      glitchtip_migrate:
        condition: service_completed_successfully
      glitchtip_redis:
        condition: service_started

  glitchtip_worker:
    image: glitchtip/glitchtip:latest
    container_name: idfm_glitchtip_worker_prod
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment: *glitchtip_env
    networks:
      - idfm_prod_network
    depends_on:
      glitchtip_migrate:
        condition: service_completed_successfully
      glitchtip_redis:
        condition: service_started

volumes:
  mysql_data_prod:
  ollama_data_prod:
  glitchtip_db_data_prod:
